<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MHServerEmu Dashboard</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<style>
		.lang-select {
			position: fixed;
			top: 10px;
			right: 10px;
			z-index: 999;
		}
	</style>
</head>
<body>
	<select class="lang-select" id="language-select">
		<option value="en">English</option>
		<option value="de">Deutsch</option>
		<option value="fr">Français</option>
		<option value="es">Español</option>
		<option value="pt">Português</option>
		<option value="ru">Русский</option>
		<option value="zh">繁體中文</option>
		<option value="cn">简体中文</option>
		<option value="ja">日本語</option>
		<option value="ko">한국어</option>
	</select>

	<div class="content">
		<h1 data-i18n="title">MHServerEmu Dashboard</h1>
		<div class="tab-button-container">
			<button id="server-status-tab-button" data-i18n="serverStatusTab">Server Status</button>
			<button id="metrics-tab-button" data-i18n="metricsTab">Metrics</button>
			<button id="region-report-tab-button" data-i18n="regionReportTab">Region Report</button>
			<button id="create-account-tab-button" data-i18n="createAccountTab">Create Account</button>
		</div>
	</div>

	<div class="content tab-content" id="server-status-tab">
		<div class="tab-controls-container">
			<button id="server-status-button" data-i18n="refresh">Refresh</button>
		</div>
		<h2 data-i18n="serverStatus">Server Status</h2>
		<div id="server-status-container"></div>
	</div>

	<div class="content tab-content" id="metrics-tab">
		<div class="tab-controls-container">
			<button id="metrics-button" data-i18n="refresh">Refresh</button>
		</div>
		<h2 data-i18n="metrics">Metrics</h2>
		<div id="metrics-report-metadata"></div>
		<h3 data-i18n="memory">Memory</h3>
		<div id="metrics-memory-container"></div>
		<h3 data-i18n="games">Games</h3>
		<select id="metrics-game-select"></select>
		<div id="metrics-game-container"></div>
	</div>

	<div class="content tab-content" id="region-report-tab">
		<div class="tab-controls-container">
			<button id="region-report-button" data-i18n="refresh">Refresh</button>
		</div>
		<h2 data-i18n="regionReport">Region Report</h2>
		<div id="region-report-container"></div>
	</div>

	<div class="content tab-content" id="create-account-tab">
		<h2 data-i18n="createAccount">Create Account</h2>
		<div class="account-form" id="account-form">
			<label for="create-account-email" data-i18n="emailAddress">Email Address</label><br>
			<input type="text" id="create-account-email" name="email" minlength="5" maxlength="320" placeholder="Email Address" required><br><br>

			<label for="create-account-player-name" data-i18n="playerName">Player Name</label><br>
			<input type="text" id="create-account-player-name" name="player-name" placeholder="Player Name" maxlength="16" required><br><br>

			<label for="create-account-password" data-i18n="password">Password</label><br>
			<input type="password" id="create-account-password" name="password" placeholder="Password" minlength="3" maxlength="64" required><br><br>

			<label for="create-account-confirm-password" data-i18n="confirmPassword">Confirm Password</label><br>
			<input type="password" id="create-account-confirm-password" name="confirm-password" placeholder="Confirm Password" minlength="3" maxlength="64" required><br><br>

			<button type="submit" id="create-account-submit-button" data-i18n="submit">Submit</button>
		</div>
	</div>

	<script type="text/javascript" src="config.js"></script>
	<script type="text/javascript" src="script.js"></script>

	<script>
		const translations = {

				regionReportTab: "Region Report", createAccountTab: "Create Account", refresh: "Refresh",
				serverStatus: "Server Status", metrics: "Metrics", memory: "Memory", games: "Games",
				regionReport: "Region Report", createAccount: "Create Account", emailAddress: "Email Address",
				playerName: "Player Name", password: "Password", confirmPassword: "Confirm Password", submit: "Submit"
			},
			de: {
				title: "MHServerEmu-Dashboard", serverStatusTab: "Serverstatus", metricsTab: "Metriken",
				regionReportTab: "Regionsbericht", createAccountTab: "Konto erstellen", refresh: "Aktualisieren",
				serverStatus: "Serverstatus", metrics: "Metriken", memory: "Speicher", games: "Spiele",
				regionReport: "Regionsbericht", createAccount: "Konto erstellen", emailAddress: "E-Mail-Adresse",
				playerName: "Spielername", password: "Passwort", confirmPassword: "Passwort bestätigen", submit: "Senden"
			},
			fr: {
				title: "Tableau de bord MHServerEmu", serverStatusTab: "État du serveur", metricsTab: "Métriques",
				regionReportTab: "Rapport régional", createAccountTab: "Créer un compte", refresh: "Rafraîchir",
				serverStatus: "État du serveur", metrics: "Métriques", memory: "Mémoire", games: "Jeux",
				regionReport: "Rapport régional", createAccount: "Créer un compte", emailAddress: "Adresse e-mail",
				playerName: "Nom du joueur", password: "Mot de passe", confirmPassword: "Confirmer le mot de passe", submit: "Envoyer"
			},

				serverStatus: "Estado del servidor", metrics: "Métricas", memory: "Memoria", games: "Juegos",
				regionReport: "Informe regional", createAccount: "Crear cuenta", emailAddress: "Correo electrónico",
				playerName: "Nombre del jugador", password: "Contraseña", confirmPassword: "Confirmar contraseña", submit: "Enviar"
			},
			pt: {
				title: "Painel MHServerEmu", serverStatusTab: "Status do servidor", metricsTab: "Métricas",
				regionReportTab: "Relatório regional", createAccountTab: "Criar conta", refresh: "Atualizar",
				serverStatus: "Status do servidor", metrics: "Métricas", memory: "Memória", games: "Jogos",
				regionReport: "Relatório regional", createAccount: "Criar conta", emailAddress: "Endereço de e-mail",
				playerName: "Nome do jogador", password: "Senha", confirmPassword: "Confirmar senha", submit: "Enviar"
			},
			ru: {
				title: "Панель MHServerEmu", serverStatusTab: "Статус сервера", metricsTab: "Метрики",
				regionReportTab: "Региональный отчёт", createAccountTab: "Создать аккаунт", refresh: "Обновить",
				serverStatus: "Статус сервера", metrics: "Метрики", memory: "Память", games: "Игры",
				regionReport: "Региональный отчёт", createAccount: "Создать аккаунт", emailAddress: "Адрес электронной почты",
				playerName: "Имя игрока", password: "Пароль", confirmPassword: "Подтвердите пароль", submit: "Отправить"
			},
			zh: {
				title: "MHServerEmu 控制台", serverStatusTab: "伺服器狀態", metricsTab: "系統監測",
				regionReportTab: "地區報告", createAccountTab: "建立帳號", refresh: "重新整理",
				serverStatus: "伺服器狀態", metrics: "系統監測", memory: "記憶體", games: "遊戲",

				playerName: "玩家名稱", password: "密碼", confirmPassword: "確認密碼", submit: "送出"
			},
			cn: {
				title: "MHServerEmu 控制台", serverStatusTab: "服务器状态", metricsTab: "系统监测",
				regionReportTab: "地区报告", createAccountTab: "创建账号", refresh: "刷新",
				serverStatus: "服务器状态", metrics: "系统监测", memory: "内存", games: "游戏",
				regionReport: "地区报告", createAccount: "创建账号", emailAddress: "电子邮件地址",
				playerName: "玩家名称", password: "密码", confirmPassword: "确认密码", submit: "提交"
			},
			ja: {
				title: "MHServerEmu ダッシュボード", serverStatusTab: "サーバー状態", metricsTab: "メトリクス",
				regionReportTab: "地域レポート", createAccountTab: "アカウント作成", refresh: "更新",
				serverStatus: "サーバー状態", metrics: "メトリクス", memory: "メモリ", games: "ゲーム",
				regionReport: "地域レポート", createAccount: "アカウント作成", emailAddress: "メールアドレス",
				playerName: "プレイヤー名", password: "パスワード", confirmPassword: "パスワード確認", submit: "送信"
			},
			ko: {
				title: "MHServerEmu 대시보드", serverStatusTab: "서버 상태", metricsTab: "메트릭",
				regionReportTab: "지역 보고서", createAccountTab: "계정 만들기", refresh: "새로 고침",
				serverStatus: "서버 상태", metrics: "메트릭", memory: "메모리", games: "게임",
				regionReport: "지역 보고서", createAccount: "계정 만들기", emailAddress: "이메일 주소",
				playerName: "플레이어 이름", password: "비밀번호", confirmPassword: "비밀번호 확인", submit: "제출"
			}
		};

		function setLanguage(lang) {
			const elems = document.querySelectorAll("[data-i18n]");
			elems.forEach(el => {
				const key = el.getAttribute("data-i18n");
				if (translations[lang] && translations[lang][key]) {
					el.textContent = translations[lang][key];
					if (el.placeholder !== undefined && el.placeholder !== "") {
						el.placeholder = translations[lang][key];
					}
				}
			});
			document.documentElement.lang = lang;
			localStorage.setItem("lang", lang);
			document.getElementById("language-select").value = lang;
		}

		function detectLanguage() {
			const saved = localStorage.getItem("lang");
			if (saved) return saved;
			const browserLang = navigator.language.toLowerCase();
			if (browserLang.startsWith("zh-tw") || browserLang.startsWith("zh-hk")) return "zh";
			if (browserLang.startsWith("zh")) return "cn";
			if (browserLang.startsWith("de")) return "de";
			if (browserLang.startsWith("fr")) return "fr";
			if (browserLang.startsWith("es")) return "es";
			if (browserLang.startsWith("pt")) return "pt";
			if (browserLang.startsWith("ru")) return "ru";
			if (browserLang.startsWith("ja")) return "ja";
			if (browserLang.startsWith("ko")) return "ko";
			return "en";
		}

		document.getElementById("language-select").addEventListener("change", e => {
			setLanguage(e.target.value);
		});

		window.addEventListener("DOMContentLoaded", () => {
			setLanguage(detectLanguage());
		});
	</script>
</body>
</html>
